<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INTERSTELLAR // PROYECTO BIFROST</title>
    <style>
        /* ============================================================
           ESTILOS GLOBALES - Reset & Temas
           ============================================================ */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            color: #c8d6e5;
            height: 100vh;
            height: 100dvh;
            position: relative;
        }

        /* Efecto CRT Scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0) 0px,
                rgba(0, 0, 0, 0) 1px,
                rgba(0, 0, 0, 0.12) 2px,
                rgba(0, 0, 0, 0.12) 3px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* Starfield & Nebula Backdrop Canvas */
        #space-backdrop {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #050612 0%, #000000 100%);
        }

        /* HUD Superior */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .hud-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(14px, 2vw, 18px);
            font-weight: 700;
            letter-spacing: 3px;
            color: #00dcff;
            text-shadow: 0 0 10px rgba(0, 220, 255, 0.5);
            pointer-events: auto;
        }

        .audio-toggle {
            background: rgba(8, 12, 28, 0.7);
            border: 1px solid rgba(0, 220, 255, 0.3);
            color: #00dcff;
            padding: 8px 16px;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            border-radius: 4px;
            backdrop-filter: blur(8px);
            pointer-events: auto;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 220, 255, 0.1);
        }

        .audio-toggle:hover {
            background: rgba(0, 220, 255, 0.15);
            border-color: #00dcff;
            box-shadow: 0 0 15px rgba(0, 220, 255, 0.3);
        }

        /* Contenedor Principal (App wrapper) */
        #app {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
        }

        /* Glassmorphic Panel Base */
        .glass-panel {
            background: rgba(4, 8, 16, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 220, 255, 0.25);
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.6),
                0 0 30px rgba(0, 220, 255, 0.08),
                inset 0 0 20px rgba(0, 220, 255, 0.03);
            border-radius: 8px;
            padding: clamp(20px, 4vw, 40px);
            width: 100%;
            max-width: 840px;
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: panel-fade-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .glass-panel::-webkit-scrollbar {
            display: none;
        }

        @keyframes panel-fade-in {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Botón Estilo Espacial */
        .btn-orbit {
            background: linear-gradient(135deg, rgba(8, 16, 32, 0.9) 0%, rgba(0, 50, 80, 0.5) 100%);
            border: 1px solid #ff7800;
            color: #ff7800;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 16px 32px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 120, 0, 0.1);
            width: fit-content;
            align-self: center;
            margin-top: 15px;
        }

        .btn-orbit:hover {
            color: #fff;
            border-color: #00dcff;
            background: linear-gradient(135deg, rgba(0, 220, 255, 0.25) 0%, rgba(0, 50, 80, 0.8) 100%);
            box-shadow: 0 0 25px rgba(0, 220, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn-orbit:active {
            transform: translateY(1px);
        }

        /* Títulos */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(20px, 3.5vw, 30px);
            font-weight: 900;
            letter-spacing: 4px;
            color: #ff7800;
            text-shadow: 0 0 15px rgba(255, 120, 0, 0.4);
            text-align: center;
            border-bottom: 1px solid rgba(255, 120, 0, 0.2);
            padding-bottom: 12px;
        }

        /* FASE 1: Quantum Welcome */
        .welcome-phase {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .telemetry-block {
            background: rgba(0, 2, 8, 0.7);
            border: 1px dashed rgba(0, 220, 255, 0.2);
            padding: 18px;
            border-radius: 4px;
            width: 100%;
            max-width: 500px;
            text-align: left;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #8fa0b3;
        }

        .telemetry-line {
            margin-bottom: 4px;
        }

        .telemetry-cyan {
            color: #00dcff;
        }

        .telemetry-warn {
            color: #ff7800;
        }

        /* FASE 2: Narrative Dialogue */
        .dialogue-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            min-height: 250px;
            justify-content: space-between;
        }

        .dialogue-character-box {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .avatar-box {
            width: 70px;
            height: 70px;
            border: 2px solid rgba(0, 220, 255, 0.4);
            background: rgba(0, 5, 15, 0.8);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 220, 255, 0.1);
            flex-shrink: 0;
        }

        .avatar-tars {
            border-color: rgba(255, 120, 0, 0.5);
            box-shadow: 0 0 10px rgba(255, 120, 0, 0.1);
        }

        .dialogue-text-bubble {
            background: rgba(8, 12, 28, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px;
            border-radius: 6px;
            flex-grow: 1;
            font-size: 16px;
            line-height: 1.5;
            position: relative;
        }

        .dialogue-text-bubble::before {
            content: '';
            position: absolute;
            top: 20px;
            left: -10px;
            border-width: 5px 10px 5px 0;
            border-style: solid;
            border-color: transparent rgba(8, 12, 28, 0.5) transparent transparent;
        }

        .dialogue-name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        /* FASE JUEGO: Estructuras comunes de Canvas */
        .game-canvas-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .hud-overlay {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #00dcff;
            font-family: 'Share Tech Mono', monospace;
            border-bottom: 1px solid rgba(0, 220, 255, 0.15);
            padding-bottom: 6px;
        }

        .canvas-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 8/5;
            background: #010206;
            border: 2px solid rgba(0, 220, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 220, 255, 0.05);
            position: relative;
            border-radius: 4px;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Controles para Móviles */
        .mobile-controls {
            display: none;
            width: 100%;
            max-width: 400px;
            margin: 10px auto 0;
            justify-content: center;
            gap: 10px;
        }

        /* Solo mostramos controles móviles si es necesario táctil */
        @media (hover: none) and (pointer: coarse) {
            .mobile-controls {
                display: flex;
            }
        }

        .ctrl-btn {
            background: rgba(8, 16, 32, 0.85);
            border: 1px solid rgba(0, 220, 255, 0.4);
            color: #00dcff;
            width: 60px;
            height: 50px;
            border-radius: 6px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
        }

        .ctrl-btn:active {
            background: rgba(0, 220, 255, 0.25);
            box-shadow: 0 0 15px rgba(0, 220, 255, 0.5);
        }

        .dpad-grid {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 6px;
        }

        /* FASE 6: La Elección */
        .cards-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        @media (min-width: 600px) {
            .cards-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .choice-card {
            background: rgba(4, 10, 22, 0.7);
            border: 1px solid rgba(0, 220, 255, 0.2);
            border-radius: 6px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: center;
        }

        .choice-card:hover {
            border-color: #ff7800;
            box-shadow: 0 0 25px rgba(255, 120, 0, 0.25);
            transform: translateY(-4px);
        }

        .choice-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .card-cyan h3 { color: #00dcff; }
        .card-orange h3 { color: #ff7800; }

        .choice-card p {
            font-size: 14px;
            line-height: 1.6;
            color: #a0b3c6;
        }

        /* FASE 7: Scroll de Epílogo */
        .epilogue-scroll-box {
            position: relative;
            height: 350px;
            overflow: hidden;
            border: 1px solid rgba(255, 120, 0, 0.15);
            background: rgba(0, 1, 4, 0.8);
            border-radius: 4px;
            padding: 20px;
        }

        .epilogue-content {
            position: absolute;
            top: 350px;
            left: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
            font-size: 16px;
            line-height: 1.8;
            color: #d1dbe5;
            padding-bottom: 50px;
        }

        .epilogue-heading {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: #ff7800;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 120, 0, 0.3);
        }

        .epilogue-poem {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #00dcff;
            text-shadow: 0 0 15px rgba(0, 220, 255, 0.5);
            margin: 15px 0;
            line-height: 1.5;
        }

        /* Pantallas de Game Over o Fallo */
        .failed-screen {
            position: absolute;
            inset: 0;
            background: rgba(12, 2, 2, 0.92);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .failed-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .failed-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 900;
            color: #ff3838;
            text-shadow: 0 0 15px rgba(255, 56, 56, 0.6);
            letter-spacing: 3px;
        }

        /* Indicador de Transición de fase */
        .phase-indicator {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(0, 220, 255, 0.5);
            border: 1px solid rgba(0, 220, 255, 0.2);
            padding: 4px 10px;
            border-radius: 3px;
            align-self: center;
        }
    </style>
</head>
<body>

    <!-- Canvas de Fondo: Estrellas y Agujero de Gusano -->
    <canvas id="space-backdrop"></canvas>

    <header>
        <div class="hud-title">COOPER_STATION // PROYECTO BIFROST</div>
        <button class="audio-toggle" id="audio-btn">MÚSICA: OFF</button>
    </header>

    <div id="app">
        <!-- Panel Principal Contenedor del Juego -->
        <div class="glass-panel" id="main-panel">
            <!-- El contenido dinámico se inyectará aquí a través del script principal -->
        </div>
    </div>

    <!-- Script Principal del Universo -->
    <script>
        /* ============================================================
           MOTOR DE AUDIO MAJESTUOSO (Web Audio API - Hans Zimmer Style)
           ============================================================ */
        class InterstellarAudio {
            constructor() {
                this.ctx = null;
                this.masterVolume = null;
                this.isPlaying = false;
                this.oscillators = [];
                this.droneOscillators = [];
                this.compressor = null;
                this.chordInterval = null;
                this.chordIndex = 0;
                this.isFast = false;
            }

            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.masterVolume = this.ctx.createGain();
                this.masterVolume.gain.setValueAtTime(0.25, this.ctx.currentTime);

                this.compressor = this.ctx.createDynamicsCompressor();
                this.compressor.threshold.setValueAtTime(-24, this.ctx.currentTime);
                this.compressor.knee.setValueAtTime(30, this.ctx.currentTime);
                this.compressor.ratio.setValueAtTime(12, this.ctx.currentTime);
                this.compressor.attack.setValueAtTime(0.003, this.ctx.currentTime);
                this.compressor.release.setValueAtTime(0.25, this.ctx.currentTime);

                this.masterVolume.connect(this.compressor);
                this.compressor.connect(this.ctx.destination);

                this.startDrone();
                this.startChordProgression();
                this.isPlaying = true;
            }

            startDrone() {
                // A1 (55Hz), A2 (110Hz), E2 (82.4Hz) para un sonido de pedal bajo masivo
                const droneFrequencies = [55.0, 55.3, 82.4];
                droneFrequencies.forEach((freq, idx) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    const filter = this.ctx.createBiquadFilter();

                    osc.type = idx === 1 ? 'sawtooth' : 'triangle';
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);

                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(120, this.ctx.currentTime);

                    // LFO para efecto respiración del volumen del pedal
                    const lfo = this.ctx.createOscillator();
                    const lfoGain = this.ctx.createGain();
                    lfo.frequency.setValueAtTime(0.12 + idx * 0.04, this.ctx.currentTime);
                    lfoGain.gain.setValueAtTime(0.06, this.ctx.currentTime);

                    lfo.connect(lfoGain);
                    lfoGain.connect(gain.gain);

                    gain.gain.setValueAtTime(0.18, this.ctx.currentTime);

                    osc.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.masterVolume);

                    osc.start();
                    lfo.start();

                    this.droneOscillators.push({ osc, lfo, gain });
                });
            }

            playOrganPipe(freq, duration, gainValue) {
                if (!this.ctx || this.ctx.state === 'suspended') return;
                const osc1 = this.ctx.createOscillator(); // Principal
                const osc2 = this.ctx.createOscillator(); // Octava superior
                const osc3 = this.ctx.createOscillator(); // Quinta armónica (12th)
                const osc4 = this.ctx.createOscillator(); // Sub-octava profunda
                
                const filter = this.ctx.createBiquadFilter();
                const gainNode = this.ctx.createGain();

                osc1.type = 'triangle';
                osc1.frequency.setValueAtTime(freq, this.ctx.currentTime);
                osc1.detune.setValueAtTime(Math.random() * 8 - 4, this.ctx.currentTime);

                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(freq * 2, this.ctx.currentTime);
                osc2.detune.setValueAtTime(Math.random() * 10 - 5, this.ctx.currentTime);

                osc3.type = 'sine';
                osc3.frequency.setValueAtTime(freq * 3, this.ctx.currentTime);
                osc3.detune.setValueAtTime(Math.random() * 6 - 3, this.ctx.currentTime);

                osc4.type = 'sine';
                osc4.frequency.setValueAtTime(freq / 2, this.ctx.currentTime);
                osc4.detune.setValueAtTime(Math.random() * 12 - 6, this.ctx.currentTime);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000, this.ctx.currentTime);
                filter.Q.setValueAtTime(1.8, this.ctx.currentTime);

                gainNode.gain.setValueAtTime(0, this.ctx.currentTime);
                // Ataque lento e imponente de órgano de iglesia
                gainNode.gain.linearRampToValueAtTime(gainValue * 0.28, this.ctx.currentTime + 1.6);
                gainNode.gain.setValueAtTime(gainValue * 0.28, this.ctx.currentTime + duration - 2.2);
                // Liberación atmosférica
                gainNode.gain.linearRampToValueAtTime(0, this.ctx.currentTime + duration);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                osc4.connect(filter);

                filter.connect(gainNode);
                gainNode.connect(this.masterVolume);

                osc1.start();
                osc2.start();
                osc3.start();
                osc4.start();

                osc1.stop(this.ctx.currentTime + duration);
                osc2.stop(this.ctx.currentTime + duration);
                osc3.stop(this.ctx.currentTime + duration);
                osc4.stop(this.ctx.currentTime + duration);
                
                this.oscillators.push({ osc1, osc2, osc3, osc4, gainNode });
            }

            playChord(frequencies, duration) {
                const individualGain = 0.24 / frequencies.length;
                frequencies.forEach(freq => {
                    this.playOrganPipe(freq, duration, individualGain);
                });
            }

            startChordProgression() {
                // Progresión solemne inspirada en la película (LAm, FA, DOm, SOL)
                const normalChords = [
                    [220.00, 261.63, 329.63], // Am
                    [174.61, 220.00, 261.63], // F
                    [130.81, 196.00, 261.63, 329.63], // C
                    [196.00, 246.94, 293.66]  // G
                ];

                const intenseChords = [
                    [220.00, 261.63, 392.00], // Am7 (Más tensión)
                    [174.61, 220.00, 349.23], // F (Mayor alcance)
                    [220.00, 293.66, 349.23], // Dm/A (Incertidumbre)
                    [293.66, 329.63, 392.00]  // Em7/D
                ];

                const tick = () => {
                    if (!this.isPlaying) return;
                    const chords = this.isFast ? intenseChords : normalChords;
                    const duration = this.isFast ? 4.5 : 8.0;

                    this.playChord(chords[this.chordIndex], duration);
                    this.chordIndex = (this.chordIndex + 1) % chords.length;
                };

                tick();
                this.chordInterval = setInterval(tick, (this.isFast ? 4.4 : 7.9) * 1000);
            }

            setIntensity(fastMode) {
                if (this.isFast === fastMode) return;
                this.isFast = fastMode;
                clearInterval(this.chordInterval);
                this.chordIndex = 0;
                this.startChordProgression();
            }

            playAlarm() {
                if (!this.ctx || this.ctx.state === 'suspended') return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(293.66, this.ctx.currentTime); // D4
                osc.frequency.linearRampToValueAtTime(587.33, this.ctx.currentTime + 0.35); // D5

                gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.4);

                osc.connect(gain);
                gain.connect(this.masterVolume);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.45);
            }

            playClick() {
                if (!this.ctx || this.ctx.state === 'suspended') return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(900, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.08);

                osc.connect(gain);
                gain.connect(this.masterVolume);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.09);
            }

            toggle() {
                if (!this.ctx) {
                    this.init();
                    return true;
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                    this.isPlaying = true;
                    return true;
                } else {
                    this.ctx.suspend();
                    this.isPlaying = false;
                    return false;
                }
            }
        }

        const audio = new InterstellarAudio();

        // Control del botón de audio
        const audioBtn = document.getElementById('audio-btn');
        audioBtn.addEventListener('click', () => {
            const active = audio.toggle();
            audioBtn.textContent = active ? 'MÚSICA: ON' : 'MÚSICA: OFF';
            audioBtn.style.color = active ? '#ff7800' : '#00dcff';
            audioBtn.style.borderColor = active ? '#ff7800' : 'rgba(0, 220, 255, 0.3)';
        });


        /* ============================================================
           SISTEMA DE ANIMACIÓN DEL FONDO (Túnel y estrellas)
           ============================================================ */
        const spaceCanvas = document.getElementById('space-backdrop');
        const sCtx = spaceCanvas.getContext('2d');
        
        let stars = [];
        let wormholeWarp = 0.005;
        let mode = 'stars'; // stars, wormhole, gargantua

        function resizeSpaceCanvas() {
            spaceCanvas.width = window.innerWidth;
            spaceCanvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const count = 180;
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * spaceCanvas.width - spaceCanvas.width / 2,
                    y: Math.random() * spaceCanvas.height - spaceCanvas.height / 2,
                    z: Math.random() * spaceCanvas.width,
                    color: Math.random() > 0.85 ? '#ff7800' : '#00dcff',
                    r: Math.random() * 1.5 + 0.5
                });
            }
        }

        window.addEventListener('resize', resizeSpaceCanvas);
        resizeSpaceCanvas();

        function drawSpace() {
            sCtx.fillStyle = 'rgba(0, 0, 2, 0.1)';
            sCtx.fillRect(0, 0, spaceCanvas.width, spaceCanvas.height);
            
            const cx = spaceCanvas.width / 2;
            const cy = spaceCanvas.height / 2;

            if (mode === 'stars') {
                // Movimiento espacial estándar
                for (let star of stars) {
                    star.z -= 1.2;
                    if (star.z <= 0) star.z = spaceCanvas.width;
                    
                    const sx = (star.x / star.z) * spaceCanvas.width + cx;
                    const sy = (star.y / star.z) * spaceCanvas.height + cy;
                    const size = ((spaceCanvas.width - star.z) / spaceCanvas.width) * star.r * 1.5;

                    sCtx.beginPath();
                    sCtx.arc(sx, sy, Math.max(0.2, size), 0, Math.PI * 2);
                    sCtx.fillStyle = star.color;
                    sCtx.shadowColor = star.color;
                    sCtx.shadowBlur = 4;
                    sCtx.fill();
                    sCtx.shadowBlur = 0;
                }
            } else if (mode === 'wormhole') {
                // Efecto de túnel de gusano cuántico
                wormholeWarp += 0.0003;
                for (let i = 0; i < stars.length; i++) {
                    const star = stars[i];
                    star.z -= 4;
                    if (star.z <= 0) star.z = spaceCanvas.width;

                    const angle = Math.atan2(star.y, star.x) + wormholeWarp * (star.z / 200);
                    const dist = Math.sqrt(star.x * star.x + star.y * star.y);
                    const rx = Math.cos(angle) * dist;
                    const ry = Math.sin(angle) * dist;

                    const sx = (rx / star.z) * spaceCanvas.width + cx;
                    const sy = (ry / star.z) * spaceCanvas.height + cy;
                    const size = ((spaceCanvas.width - star.z) / spaceCanvas.width) * star.r * 2.5;

                    sCtx.beginPath();
                    sCtx.arc(sx, sy, Math.max(0.1, size), 0, Math.PI * 2);
                    sCtx.fillStyle = i % 2 === 0 ? '#00dcff' : '#ff7800';
                    sCtx.fill();
                }
            }
            requestAnimationFrame(drawSpace);
        }
        drawSpace();

        /* ------------------------------------------------------------

        function renderStealthGame() {
            const container = document.createElement('div');
            container.className = 'game-canvas-wrapper';
            
            container.innerHTML = `
                <div class="hud-overlay">
                    <div>SUJETO DE PRUEBA: COOPER [PILOTO]</div>

                        <button class="btn-orbit" id="retry-stealth-btn" style="margin-top: 10px;">Reiniciar Infiltración</button>

                <div style="font-size:13px; color: #8fa0b3; text-align: center;">
                    Usa las <span style="color:#00dcff">FLECHAS DE DIRECCIÓN</span> o <span style="color:#00dcff">WASD</span> para mover a Cooper. Esquiva los conos de visión amarillos de los guardias y alcanza el hangar de la Endurance II (zona verde) en la parte superior.

                <div class="mobile-controls">
