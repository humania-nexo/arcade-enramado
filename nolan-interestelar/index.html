                }

                // Movimiento inercial de la Endurance II
                if (keys['arrowleft'] || keys['a']) {
                    ship.speedX -= ship.accel;
                    ship.angle = -0.15; // Inclinación visual de giro
                } else if (keys['arrowright'] || keys['d']) {
                    ship.speedX += ship.accel;
                    ship.angle = 0.15;
                } else {
                    ship.angle = 0;
                }

                ship.speedX *= ship.drag;
                ship.x += ship.speedX;

                // Contener dentro del canvas
                if (ship.x < ship.radius) { ship.x = ship.radius; ship.speedX = 0; }
                if (ship.x > canvas.width - ship.radius) { ship.x = canvas.width - ship.radius; ship.speedX = 0; }

                // Efecto screen shake
                if (shake > 0) shake *= 0.9;

                // Generar asteroides periódicamente
                const spawnInterval = Math.max(7, 40 - Math.floor(distance / 120)); // Aumenta frecuencia
                if (frames % spawnInterval === 0) {
                    const radius = Math.random() * 22 + 18;
                    asteroids.push({
                        x: Math.random() * (canvas.width - radius * 2) + radius,
                        y: -radius - 10,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: Math.random() * 3.5 + 4.0 + (distance / 400), // Aumenta velocidad
                        r: radius,
                        rot: Math.random() * Math.PI,
                        rotSpeed: (Math.random() - 0.5) * 0.05,
                        points: makeAsteroidPoints(radius)
                    });
                }

                // Actualizar asteroides
                for (let i = asteroids.length - 1; i >= 0; i--) {
                    const ast = asteroids[i];
                    ast.x += ast.vx;
                    ast.y += ast.vy;
                    ast.rot += ast.rotSpeed;

                    // Colisión con Endurance
                    const dx = ast.x - ship.x;
                    const dy = ast.y - ship.y;
                    const distSq = dx * dx + dy * dy;
                    const collisionDist = ast.r + ship.radius;

                    if (distSq < collisionDist * collisionDist) {
                        // Colisión detectada
                        shields--;
                        shake = 18;
                        audio.playAlarm();
                        
                        // Eliminar asteroide explotando partículas
                        for (let k = 0; k < 15; k++) {
                            debrisParticles.push({
                                x: ast.x, y: ast.y,
                                vx: (Math.random() - 0.5) * 6,
                                vy: (Math.random() - 0.5) * 6,
                                size: Math.random() * 3 + 1,
                                color: '#ff7800',
                                alpha: 1
                            });
                        }
                        
                        asteroids.splice(i, 1);

                        // Actualizar HUD escudos
                        if (shields === 2) {
                            shieldsEl.textContent = "ESCUDOS: ██░ 66%";
                            shieldsEl.style.color = "#ffbe1a";
                        } else if (shields === 1) {
                            shieldsEl.textContent = "ESCUDOS: █░░ 33%";
                            shieldsEl.style.color = "#ff3838";
                        } else if (shields <= 0) {
                            shieldsEl.textContent = "ESCUDOS: ░░░ CRÍTICO";
                            isFailed = true;
                            failedScreen.classList.add('active');
                        }
                        continue;
                    }

                    // Remover si sale de pantalla
                    if (ast.y > canvas.height + ast.r) {
                        asteroids.splice(i, 1);
                    }
                }

                // Actualizar partículas de polvo espacial/detritos
                for (let i = debrisParticles.length - 1; i >= 0; i--) {
                    const p = debrisParticles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.alpha -= 0.035;
                    if (p.alpha <= 0) {
                        debrisParticles.splice(i, 1);
                    }
                }

                // Fondo parallax
                for (let star of parallaxStars) {
                    star.y += star.speed;
                    if (star.y > canvas.height) {
                        star.y = 0;
                        star.x = Math.random() * canvas.width;
                    }
                }
            }

            function draw() {
                ctx.save();
                if (shake > 1) {
                    const dx = (Math.random() - 0.5) * shake;
                    const dy = (Math.random() - 0.5) * shake;
                    ctx.translate(dx, dy);
                }

                ctx.fillStyle = '#010206';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Dibujar estrellas en parallax
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                for (let star of parallaxStars) {
                    ctx.fillRect(star.x, star.y, star.size, star.size);
                }

                // Dibujar partículas de detritos / explosiones
                for (let p of debrisParticles) {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // Dibujar asteroides como polígonos rocosos detallados
                for (let ast of asteroids) {
                    ctx.save();
                    ctx.translate(ast.x, ast.y);
                    ctx.rotate(ast.rot);
                    
                    ctx.strokeStyle = 'rgba(255, 120, 0, 0.45)';
                    ctx.lineWidth = 1.5;
                    ctx.shadowColor = '#ff7800';
                    ctx.shadowBlur = 4;
                    
                    // Cuerpo del asteroide
                    ctx.fillStyle = '#080c18';
                    ctx.beginPath();
                    ctx.moveTo(ast.points[0].x, ast.points[0].y);
                    for (let k = 1; k < ast.points.length; k++) {
                        ctx.lineTo(ast.points[k].x, ast.points[k].y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // Dibujar algunas grietas de rocas en el interior del asteroide
                    ctx.strokeStyle = 'rgba(255, 120, 0, 0.2)';
                    ctx.beginPath();
                    ctx.moveTo(-ast.r * 0.4, -ast.r * 0.2);
                    ctx.lineTo(ast.r * 0.2, ast.r * 0.4);
                    ctx.stroke();

                    ctx.restore();
                }

                // Dibujar la Endurance II (Estructura de Anillo modular espacial)
                const propulsionActive = keys['arrowleft'] || keys['a'] || keys['arrowright'] || keys['d'] || Math.abs(ship.speedX) > 0.1;
                let propulsionSide = 0;
                if (keys['arrowleft'] || keys['a'] || ship.speedX < -0.1) propulsionSide = -1;
                else if (keys['arrowright'] || keys['d'] || ship.speedX > 0.1) propulsionSide = 1;

                drawEnduranceV2(ctx, ship.x, ship.y, ship.radius, ship.angle - Math.PI / 2, propulsionActive, propulsionSide);

                ctx.restore(); // Termina shake
                ctx.shadowBlur = 0;
            }

            function loop() {
                update();
                draw();
                if (!isFailed && !isFinished) {
                    runId = requestAnimationFrame(loop);
                }
            }

            loop();

            retryBtn.addEventListener('click', () => {
                isFailed = false;
                isFinished = false;
                shields = 3;
                distance = 0;
                asteroids = [];
                debrisParticles = [];
                ship.x = 400;
                ship.speedX = 0;
                shieldsEl.textContent = "ESCUDOS: ███ 100%";
                shieldsEl.style.color = "#00dcff";
                failedScreen.classList.remove('active');
                audio.playClick();
                cancelAnimationFrame(runId);
                loop();
            });

            successBtn.addEventListener('click', () => {
                audio.playClick();
                cancelAnimationFrame(runId);
                changePhase('wormhole');
            });
        }

                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    // Esfera central negra que distorsiona las estrellas
                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(wx, wy, wRadius - 1.5, 0, Math.PI * 2);
                    ctx.fill();

                    // Dibujar Endurance V2 volando de izquierda a derecha
                    // Flamita apuntando a la izquierda (Math.PI) de forma estable
                    const shipX = cx - 180 + Math.sin(time * 0.25) * 15;

                    grad.addColorStop(0.7, '#007ca5');

                    const shakeY = (Math.random() - 0.5) * 5;

                    // Draw Endurance V2 in the center, spinning (no engines active during warp)
                    drawEnduranceV2(ctx, cx + shakeX, cy + shakeY, 32, time * 0.05, false, 0);
                }

                runId = requestAnimationFrame(drawWormholeScene);
            }

            drawWormholeScene();
        }

                    nextBtn.style.borderColor = "#ff7800";
                    nextBtn.style.color = "#ff7800";
                }

                function type() {
                    if (!txtEl) return;
                    if (charIdx < txt.length) {
                        txtEl.textContent += txt.charAt(charIdx);
                        charIdx++;
                        setTimeout(type, 15);
                    }
                }
                type();
            }

            startPreorbitBtn.addEventListener('click', () => {
                audio.playClick();
                approaching = false; // Switch to orbit scene
                digestScreen.classList.remove('active');
                setTimeout(() => {
                    digestScreen.style.display = 'none';
                }, 500);
                
                diagBox.style.display = 'flex';
                nextBtn.style.display = 'block';
                showPreorbitDialogue();
            });

            nextBtn.addEventListener('click', () => {
                if (currentDiag < preorbitDialogues.length - 1) {
                    currentDiag++;
                    showPreorbitDialogue();
                } else {
                    cancelAnimationFrame(runId);
                    changePhase('orbit');
                }
            });

            // Singular approaching animation loop
            function drawPreorbit() {
                const singularityX = 400;
                const singularityY = 250;
                const animTime = Date.now() * 0.0005;

                if (approaching) {
                    // ─── ESCENA DE APROXIMACIÓN AL SISTEMA DE GARGANTÚA (Vuelo izquierda a derecha) ───
                    ctx.fillStyle = '#000003';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Estrellas de derecha a izquierda
                    ctx.fillStyle = '#ffffff';
                    for (let star of stars) {
                        star.x -= star.speed;
                        if (star.x < 0) {
                            star.x = canvas.width;
                            star.y = Math.random() * canvas.height;
                        }
                        ctx.fillRect(star.x, star.y, star.size, star.size);
                    }

                    // Dibujar Gargantúa y su disco de acreción de lejos en la derecha (x = 580, y = 250)
                    const gx = 580;
                    const gy = 250;
                    const gRadius = 60;

                    // Accretion disk particles drawn around (gx, gy)
                    for (let i = 0; i < 80; i++) {
                        const radius = (i * 0.8) + 40;
                        const angle = (Date.now() * 0.0008 + i * 0.12);
                        const px = Math.cos(angle) * radius;
                        let py = Math.sin(angle) * radius;
                        let ry = gy + py;
                        if (py < 0) {
                            ry -= (1 - (radius / 150)) * 20; // Lensing effect
                        }
                        ctx.fillStyle = `hsl(${20 + (i%5)}, 100%, 65%)`;
                        ctx.beginPath();
                        ctx.arc(gx + px, ry, 1, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Singularidad negra en el centro del disco
                    ctx.fillStyle = '#000000';
                    ctx.shadowColor = '#ff7800';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(gx, gy, 18, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Dibujar Endurance V2 volando de izquierda a derecha
                    // Flamita apuntando a la izquierda (Math.PI) de forma estable
                    const timeVal = Date.now() * 0.001;
                    const shipX = cx - 180 + Math.sin(timeVal * 0.2) * 10;
                    const shipY = cy + Math.cos(timeVal * 0.2) * 6;
                    drawEnduranceV2(ctx, shipX, shipY, 32, timeVal * 0.1, true, 0, Math.PI);

                } else {
                    // ─── ESCENA DE CAPTURA GRAVITATORIA (Órbita de Gargantúa) ───
                    ctx.fillStyle = '#000002';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Dibujar disco de acreción en el centro
                    for (let p of accretionParticles) {
                        p.angle += p.speed;
                        const px = Math.cos(p.angle) * p.radius;
                        const py = Math.sin(p.angle) * p.radius;
                        let rx = singularityX + px;
                        let ry = singularityY + py;

                        if (py < 0) {
                            const gravitationalWarp = (1 - (p.radius / 250)) * 45;
                            ry -= gravitationalWarp;
                        }

                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(rx, ry, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Horizonte de sucesos negro
                    ctx.fillStyle = '#000000';
                    ctx.shadowColor = '#ff7800';
                    ctx.shadowBlur = 25;
                    ctx.beginPath();
                    ctx.arc(singularityX, singularityY, 40, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Nave acercándose e insertándose en órbita
                    const shipDist = 260 - Math.min(60, (animTime % 10) * 12);
                    const shipAngle = animTime * 0.2;

                    const sx = singularityX + Math.cos(shipAngle) * shipDist;
                    const sy = singularityY + Math.sin(shipAngle) * shipDist;

                    ctx.save();
                    ctx.translate(sx, sy);
                    ctx.rotate(shipAngle + Math.PI/2);
                    
                    // Dibujamos la Endurance V2 con su propulsor de maniobra activo para la inserción orbital
                    drawEnduranceV2(ctx, 0, 0, 10, 0, true, 0);

                    ctx.restore();
                }

                runId = requestAnimationFrame(drawPreorbit);
            }

            drawPreorbit();
        }

        /* ------------------------------------------------------------
           FASE 5: GARGANTUA ORBIT STABILIZATION (GRAVITY CONTROL)
           ------------------------------------------------------------ */
        function renderOrbitGame() {
            const container = document.createElement('div');
            container.className = 'game-canvas-wrapper';
            
            container.innerHTML = `

                <div class="canvas-container">

                    <!-- Pantalla de Inicio / Instrucciones -->

                        <p style="color: #c8d6e5; font-size: 14px; max-width: 440px; text-align: center; line-height: 1.6; margin: 10px 0;">
                            La gravedad de Gargantúa nos está atrayendo con fuerza. Debes pilotar manualmente para mantener la nave dentro de la zona segura.
                        </p>
                        <div style="color: #ff7800; font-size: 13px; border: 1px dashed rgba(255, 120, 0, 0.4); padding: 12px 20px; border-radius: 4px; text-align: left; margin: 5px 0; line-height: 1.5; font-family: monospace;">
                            • <b>Arrastrar dedo en pantalla</b>: Control Deslizante (Arriba/Abajo = Distancia, Izquierda/Derecha = Rotación)<br>
                            • <b>W/S o ▲/▼</b>: Ajustar órbita (Alejar / Acercar)<br>
                            • <b>A/D o ◀/▶</b>: Rotación orbital
                        </div>
                        <button class="btn-orbit" id="start-orbit-game-btn" style="margin-top: 15px; border-color: #00dcff; color: #00dcff; box-shadow: 0 0 15px rgba(0, 220, 255, 0.25);">INICIAR MANIOBRA</button>
                    </div>

                    <div class="failed-screen" id="orbit-failed">
                        <div class="failed-title" id="orbit-fail-title">SINGULARIDAD ALCANZADA</div>
                        <p style="color: #ff3838; font-size:14px;" id="orbit-fail-desc">La Endurance II fue arrastrada al interior de Gargantúa.</p>
                        <button class="btn-orbit" id="retry-orbit-btn" style="margin-top: 10px;">Estabilizar Órbita</button>
                    </div>
                </div>
                <div class="mobile-controls">
                    <div class="dpad-grid">
                        <button class="ctrl-btn" style="grid-area: up" id="m-up-orb">▲ ALEJARSE</button>
                        <button class="ctrl-btn" style="grid-area: left" id="m-left-orb">◀ GIRO CCW</button>
                        <button class="ctrl-btn" style="grid-area: right" id="m-right-orb">GIRO CW ▶</button>
                        <button class="ctrl-btn" style="grid-area: down" id="m-down-orb">▼ ACERCARSE</button>
                    </div>
                </div>
            `;
            
            mainPanel.appendChild(container);

            const canvas = document.getElementById('orbitCanvas');
            const ctx = canvas.getContext('2d');
            const retryBtn = document.getElementById('retry-orbit-btn');
            const failedScreen = document.getElementById('orbit-failed');
            const startScreen = document.getElementById('orbit-start-screen');
            const startGameBtn = document.getElementById('start-orbit-game-btn');
            const gravityHud = document.getElementById('gravity-hud');
            const calibHud = document.getElementById('calib-hud');

            // Mecánica orbital de la nave (sintonizada para facilidad del usuario con delta-time)
            let ship = {
                radius: 180, // distancia al centro (400, 250) - empieza en el medio
                angle: 0,
                speedAngle: 0.015,
                thrustOut: 0,
                thrustIn: 0,
                thrustCCW: 0,
                thrustCW: 0
            };

            const singularityX = 400;
            const singularityY = 250;
            const targetMinRadius = 110; // rango seguro mínimo
            const targetMaxRadius = 250; // rango seguro máximo
            
            let hullStability = 100;
            let calibration = 0;
            let isFailed = false;
            let isFinished = false;
            let runId = null;
            let anomalyTimer = 0;
            let anomalyForce = 0;
            let distortion = 0;
            let lastTime = performance.now();
            let gameStarted = false;

            // Partículas del disco de acreción de Gargantúa
            let accretionParticles = [];
            for (let i = 0; i < 300; i++) {
                accretionParticles.push({
                    radius: Math.random() * 190 + 45,
                    angle: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.04 + 0.015,
                    size: Math.random() * 2 + 0.5,
                    color: `hsl(${Math.random() * 25 + 20}, 100%, ${Math.random() * 25 + 50}%)`
                });
            }

            const keys = globalKeys;

            // Táctil
            const registerOrbBtn = (id, keyName) => {
                const btn = document.getElementById(id);
                if (btn) {
                    btn.addEventListener('touchstart', e => { e.preventDefault(); keys[keyName] = true; });
                    btn.addEventListener('touchend', e => { e.preventDefault(); keys[keyName] = false; });
                }
            };
            registerOrbBtn('m-up-orb', 'w');
            registerOrbBtn('m-down-orb', 's');
            registerOrbBtn('m-left-orb', 'a');
            registerOrbBtn('m-right-orb', 'd');

            // Mobile Touch Drag for Orbit
            let touchStartX = 0;
            let touchStartY = 0;
            let isDragging = false;

            canvas.addEventListener('touchstart', e => {
                if (isFailed || isFinished || !gameStarted) return;
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                isDragging = true;
                e.preventDefault();
            }, {passive: false});

            canvas.addEventListener('touchmove', e => {
                if (!isDragging || isFailed || isFinished) return;
                const touch = e.touches[0];
                const dx = touch.clientX - touchStartX;
                const dy = touch.clientY - touchStartY;

                // Vertical drag maps to orbit distance (w/s)
                if (dy < -15) {
                    keys['w'] = true;
                    keys['s'] = false;
                } else if (dy > 15) {
                    keys['s'] = true;
                    keys['w'] = false;
                } else {
                    keys['w'] = false;
                    keys['s'] = false;
                }

                // Horizontal drag maps to orbital rotation (a/d)
                if (dx > 15) {
                    keys['d'] = true;
                    keys['a'] = false;
                } else if (dx < -15) {
                    keys['a'] = true;
                    keys['d'] = false;
                } else {
                    keys['a'] = false;
                    keys['d'] = false;
                }

                e.preventDefault();
            }, {passive: false});

            canvas.addEventListener('touchend', e => {
                isDragging = false;
                keys['w'] = false;
                keys['s'] = false;
                keys['a'] = false;
                keys['d'] = false;
                e.preventDefault();
            }, {passive: false});

            function update(dt) {
                if (isFailed || isFinished) return;

                // Atracción gravitatoria suavizada con delta-time
                const gravityPull = (0.03 + (80 / ship.radius) * 0.03) * dt;
                ship.radius -= gravityPull;

                // Anomalías gravitatorias aleatorias (Tormenta magnética de Gargantúa)
                anomalyTimer += dt;
                if (anomalyTimer >= 180) {
                    anomalyTimer = 0;
                    anomalyForce = (Math.random() - 0.5) * 0.4; // empujón hacia adentro o afuera suavizado
                }
                if (Math.abs(anomalyForce) > 0.02) {
                    ship.radius += anomalyForce * dt;
                    anomalyForce *= Math.pow(0.97, dt); // decaimiento adaptado a dt
                    distortion = Math.floor(Math.abs(anomalyForce) * 15);
                } else {
                    distortion = 0;
                }

                // Control de propulsores del jugador suavizado
                if (keys['w'] || keys['arrowup']) {
                    ship.radius += 0.20 * dt; // Propulsor exterior
                }
                if (keys['s'] || keys['arrowdown']) {
                    ship.radius -= 0.20 * dt; // Propulsor interior (retrocohete)
                }
                if (keys['a'] || keys['arrowleft']) {
                    ship.speedAngle -= 0.0004 * dt; // Giro en contra reloj
                }
                if (keys['d'] || keys['arrowright']) {
                    ship.speedAngle += 0.0004 * dt; // Giro en sentido reloj
                }

                // Aplicar velocidad angular amortiguada
                ship.speedAngle = Math.max(-0.04, Math.min(0.04, ship.speedAngle));
                ship.angle += ship.speedAngle * dt;
                ship.speedAngle *= Math.pow(0.98, dt); // fricción simulada

                // Comprobar posición de órbita segura (Anillo verde de calibración)
                if (ship.radius >= targetMinRadius && ship.radius <= targetMaxRadius) {
                    calibration += 0.08 * dt; // Calibración lenta (~20 segundos de vuelo estable)
                    if (calibration > 100) calibration = 100;
                } else {
                    // Daño estructural de la nave fuera del rango seguro
                    hullStability -= 0.08 * dt;
                    calibration -= 0.04 * dt;
                    if (calibration < 0) calibration = 0;
                    
                    if (hullStability <= 0) {
                        hullStability = 0;
                        isFailed = true;
                        document.getElementById('orbit-fail-title').textContent = "HULL INTEGRITY COMPROMISED";
                        document.getElementById('orbit-fail-desc').textContent = "Las brutales fuerzas de marea de Gargantúa aplastaron la Endurance II.";
                        failedScreen.classList.add('active');
                        audio.playAlarm();
                    }
                }

                // Actualizar HUD con avisos dinámicos
                if (ship.radius >= 380) {
                    gravityHud.textContent = `HULL STABILITY: ${Math.max(0, Math.floor(hullStability))}% [AVISO: ESCAPANDO]`;
                    gravityHud.style.color = '#ff3838';
                } else if (ship.radius <= 40 + 40) {
                    gravityHud.textContent = `HULL STABILITY: ${Math.max(0, Math.floor(hullStability))}% [AVISO: COLAPSO GRAVITATORIO]`;
                    gravityHud.style.color = '#ff3838';
                } else {
                    gravityHud.textContent = `HULL STABILITY: ${Math.max(0, Math.floor(hullStability))}%`;
                    gravityHud.style.color = hullStability < 40 ? '#ff3838' : '#ff7800';
                }
                calibHud.textContent = `CALIBRACIÓN VECTORIAL: ${Math.floor(calibration)}%`;

                // Condición de colisión directa en el horizonte de sucesos
                if (ship.radius <= 40) {
                    isFailed = true;
                    document.getElementById('orbit-fail-title').textContent = "SINGULARIDAD ALCANZADA";
                    document.getElementById('orbit-fail-desc').textContent = "La nave cruzó el horizonte de sucesos. No hay escape posible.";
                    failedScreen.classList.add('active');
                    audio.playAlarm();
                }

                // Daño por escapar de la gravedad en lugar de muerte instantánea
                if (ship.radius >= 380) {
                    hullStability -= 0.15 * dt;
                    if (hullStability <= 0) {
                        hullStability = 0;
                        isFailed = true;
                        document.getElementById('orbit-fail-title').textContent = "ÓRBITA INESTABLE: ESCAPE";
                        document.getElementById('orbit-fail-desc').textContent = "La nave se alejó demasiado de Gargantúa y se perdió en el vacío interestelar.";
                        failedScreen.classList.add('active');
                        audio.playAlarm();
                    }
                }

                // Condición de victoria de calibración orbital
                if (calibration >= 100) {
                    isFinished = true;
                    changePhase('choice');
                    return;
                }

                // Actualizar partículas de Gargantúa
                for (let p of accretionParticles) {
                    p.angle += p.speed * dt;
                }
            }

            function draw() {
                ctx.fillStyle = '#000002';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Efecto de distorsión cromática por gravedad (Dibujar copias estelares débiles desfasadas)
                if (distortion > 1) {
                    ctx.fillStyle = 'rgba(0, 220, 255, 0.08)';
                    ctx.fillRect(distortion, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'rgba(255, 120, 0, 0.08)';
                    ctx.fillRect(-distortion, 0, canvas.width, canvas.height);
                }

                // Dibujar Anillo Seguro Orbital (Verde brillante)
                ctx.strokeStyle = 'rgba(0, 255, 100, 0.1)';
                ctx.lineWidth = targetMaxRadius - targetMinRadius;
                ctx.beginPath();
                ctx.arc(singularityX, singularityY, (targetMinRadius + targetMaxRadius)/2, 0, Math.PI * 2);
                ctx.stroke();

                // Bordes del Anillo Seguro
                ctx.strokeStyle = 'rgba(0, 255, 100, 0.4)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(singularityX, singularityY, targetMinRadius, 0, Math.PI * 2);
                ctx.arc(singularityX, singularityY, targetMaxRadius, 0, Math.PI * 2);
                ctx.stroke();

                // Dibujar partículas deformadas del Disco de Acreción de Gargantúa
                // Efecto Einstein: las órbitas de fondo se curvan por encima y abajo del agujero negro.
                for (let p of accretionParticles) {
                    const px = Math.cos(p.angle) * p.radius;
                    const py = Math.sin(p.angle) * p.radius;

                    let rx = singularityX + px;
                    let ry = singularityY + py;

                    if (py < 0) {
                        const gravitationalWarp = (1 - (p.radius / 250)) * 60;
                        ry -= gravitationalWarp; // Desviar la luz hacia el polo superior
                    }

                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(rx, ry, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Dibujar Gargantúa (Event Horizon - Singularidad)
                ctx.fillStyle = '#000000';
                ctx.shadowColor = '#ff7800';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(singularityX, singularityY, 40, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Dibujar la Endurance V2 (Gran fidelidad vectorial) en órbita
                const sx = singularityX + Math.cos(ship.angle) * ship.radius;
                const sy = singularityY + Math.sin(ship.angle) * ship.radius;

                const propulsionActive = keys['w'] || keys['s'] || keys['a'] || keys['d'] || keys['arrowup'] || keys['arrowdown'] || keys['arrowleft'] || keys['arrowright'] || isDragging;
                let propulsionSide = 0;
                if (keys['w'] || keys['arrowup']) propulsionSide = 1; // thrust outwards
                else if (keys['s'] || keys['arrowdown']) propulsionSide = -1; // thrust inwards

                drawEnduranceV2(ctx, sx, sy, 12, ship.angle + Math.PI/2, propulsionActive, propulsionSide);
            }

            function loop(currentTime) {
                if (isFailed || isFinished) return;
                if (!currentTime) currentTime = performance.now();
                const elapsed = currentTime - lastTime;
                lastTime = currentTime;
                
                const dt = Math.min(3, elapsed / 16.66);

                update(dt);
                draw();
                
                if (!isFailed && !isFinished) {
                    runId = requestAnimationFrame(loop);
                }
            }

            // Iniciar interacción con pantalla de inicio
            startGameBtn.addEventListener('click', () => {
                startScreen.classList.remove('active');
                gameStarted = true;
                window.removeEventListener('keydown', startOnKey);
                // Clear any leftover keypresses to prevent instant drift/death
                for (let k in globalKeys) {
                    globalKeys[k] = false;
                }
                lastTime = performance.now();
                audio.playClick();
                loop(performance.now());
            });

            const startOnKey = (e) => {
                if (!gameStarted && (e.key === ' ' || ['w', 's', 'a', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(e.key.toLowerCase()))) {
                    window.removeEventListener('keydown', startOnKey);
                    startGameBtn.click();
                }
            };
            // Delay key-start registration to prevent key propagation from previous screens
            setTimeout(() => {
                window.addEventListener('keydown', startOnKey);
            }, 600);

            retryBtn.addEventListener('click', () => {
                isFailed = false;
                isFinished = false;
                hullStability = 100;
                calibration = 0;
                ship.radius = 180;
                ship.speedAngle = 0.015;
                failedScreen.classList.remove('active');
                startScreen.classList.add('active');
                gameStarted = false;
                audio.playClick();
                cancelAnimationFrame(runId);
                setTimeout(() => {
                    window.addEventListener('keydown', startOnKey);
                }, 600);
            });
        }

        /* ------------------------------------------------------------
           FASE 6: HORIZONTE DE SUCESOS (LA ELECCIÓN)
           ------------------------------------------------------------ */

                changePhase('epilogue');
            });

            document.getElementById('opt-cooper').addEventListener('click', () => {
                gameState.epilogueType = 'cooper';
                changePhase('epilogue');
            });
        }

        /* ------------------------------------------------------------
           FASE 7: EPÍLOGO Y DESENLACES
           ------------------------------------------------------------ */
        function renderEpilogue() {
            const container = document.createElement('div');
            container.className = 'welcome-phase';
            container.style.cssText = 'display:flex; flex-direction:column; align-items:center; padding: 20px 16px; gap:12px; min-height:100%;';

            container.innerHTML = `
                <div class="phase-indicator">TRANSMISIÓN FINAL // EXPEDIENTE BIFROST</div>
                <div class="dialogue-character-box" id="epilogue-dialogue-box" style="width:100%; max-width:760px; min-height:120px;"></div>
                <button class="btn-orbit" id="epilogue-next-btn" style="margin-top:4px;">Continuar</button>
                <div id="epilogue-conclusion-box" style="display:none; width:100%; max-width:760px;"></div>
            `;

            mainPanel.appendChild(container);

            const diagBox = document.getElementById('epilogue-dialogue-box');
            const nextBtn = document.getElementById('epilogue-next-btn');
            const conclusionBox = document.getElementById('epilogue-conclusion-box');

            // ─── DIÁLOGOS SEGÚN RUTA ─────────────────────────────────────────
            const isTarsPath = gameState.epilogueType === 'tars';

            const epilogueDialoguesTars = [
                { speaker: 'BRAND', avatar: 'BRAND', nameColor: '#f8a5c2',
                  text: 'Cooper... lo logramos. Estamos en el planeta. El aire es respirable. TARS transmitió todo.' },
                { speaker: 'COOPER', avatar: 'COOPER', nameColor: '#00dcff',
                  text: 'No puedo creerlo. Funcionó. Maldita sea, TARS, funcionó.' },
                { speaker: 'BRAND', avatar: 'BRAND', nameColor: '#f8a5c2',
                  text: 'Cooper... quítate el casco. Aquí no lo necesitas. Compruébalo tú mismo.' },
                { speaker: 'COOPER', avatar: 'COOPER_NO_HELMET', nameColor: '#00dcff',
                  text: 'Aire. Aire de verdad. Huele a tierra mojada. Como en casa.' },
                { speaker: 'BRAND', avatar: 'BRAND', nameColor: '#f8a5c2',
                  text: 'Esta es la nueva casa. La construimos nosotros. Y TARS nos la regaló.' },
                { speaker: 'COOPER', avatar: 'COOPER_NO_HELMET', nameColor: '#00dcff',
                  text: 'Hay que decírselo a alguien. Que TARS está ahí dentro. Que no se olvide quién hizo esto.' }
            ];

            const epilogueDialoguesCooper = [
                { speaker: 'TARS', avatar: 'TARS', nameColor: '#ff7800',
                  text: 'Dra. Brand. Hemos llegado. Cooper consiguió que llegáramos. Yo no habría podido sin él.' },
                { speaker: 'BRAND', avatar: 'BRAND', nameColor: '#f8a5c2',
                  text: 'Lo sé, TARS. Lo sé. Vamos a construir algo digno de su sacrificio.' },
                { speaker: 'POLITICIAN', avatar: 'POLITICIAN', nameColor: '#94a3b8',
                  text: 'Dra. Brand, los datos cuánticos pertenecen a la administración. No pueden difundirse libremente. Causarían inestabilidad.' },
                { speaker: 'BRAND', avatar: 'BRAND', nameColor: '#f8a5c2',
                  text: 'Un hombre murió para traer esos datos. No me pida que los guarde en un cajón.' },
                { speaker: 'SCIENTIST', avatar: 'SCIENTIST', nameColor: '#6ee7b7',
                  text: 'Recibimos la transmisión de Brand. Tenemos los datos. Nos vamos. Quien quiera venir, que venga.' },
                { speaker: 'BRAND', avatar: 'BRAND', nameColor: '#f8a5c2',
                  text: 'No entrés dócilmente en esa buena noche. Cooper nos lo enseñó. Enfurece contra la agonía de la luz.' }
            ];

            const dialogues = isTarsPath ? epilogueDialoguesTars : epilogueDialoguesCooper;
            let currentDiag = 0;

            function showEpilogueDialogue() {
                if (currentDiag >= dialogues.length) {
                    // Terminar — mostrar conclusión estática
                    diagBox.style.display = 'none';
                    nextBtn.style.display = 'none';
                    showConclusion();
                    return;
                }

                const data = dialogues[currentDiag];
                const isTars = data.avatar === 'TARS';
                audio.playClick();

                diagBox.innerHTML = `
                    <div class="avatar-box ${isTars ? 'avatar-tars' : ''}">
                        <canvas id="epilogue-avatar-canvas" width="64" height="64" style="width:100%; height:100%; image-rendering:pixelated;"></canvas>
                    </div>
                    <div class="dialogue-text-bubble" style="flex-grow:1;">
                        <div class="dialogue-name" style="color:${data.nameColor}">${data.speaker}</div>
                        <p id="epilogue-typewriter-text" style="color:#d1dbe5; min-height:40px;"></p>
                    </div>
                `;

                const avatarCanvas = document.getElementById('epilogue-avatar-canvas');
                if (avatarCanvas) drawPixelAvatar(data.avatar, avatarCanvas);

                const txt = data.text;
                let charIdx = 0;
                const txtEl = document.getElementById('epilogue-typewriter-text');

                nextBtn.textContent = (currentDiag === dialogues.length - 1) ? 'Ver desenlace' : 'Continuar';

                function type() {
                    if (!txtEl || !document.body.contains(txtEl)) return;
                    if (charIdx < txt.length) {
                        txtEl.textContent += txt.charAt(charIdx);
                        charIdx++;
                        setTimeout(type, 16);
                    }
                }
                type();
            }

            function showConclusion() {
                const poem = isTarsPath
                    ? '"Ni entres dócilmente en esa buena noche.<br>La historia se apaga en la comodidad del espacio."'
                    : '"No entres dócilmente en esa buena noche.<br>Enfurece, enfurece contra la agonía de la luz."';

                const summary = isTarsPath
                    ? 'TARS transmitió los datos cuánticos desde el corazón de Gargantúa. Cooper y Brand fundaron la primera colonia. Con el paso de los siglos, la humanidad olvidó su historia y empezó a venerar las transmisiones de TARS como mensajes de un dios. <strong>TARS se convirtió en el dios de una humanidad sin memoria.</strong>'
                    : 'Cooper sacrificó su nave para transmitir la ecuación gravitatoria. La administración intentó suprimir los datos, pero la Dra. Brand los difundió en un mensaje radial codificado. Cientos de científicos rebeldes abandonaron las estaciones y siguieron su señal hasta el planeta habitable. <strong>El sacrificio de Cooper encendió la rebelión. La humanidad volvió a habitar las estrellas.</strong>';

                conclusionBox.innerHTML = `
                    <div class="telemetry-block" style="border-color:rgba(0,220,255,0.35); padding:20px 24px; margin:0 auto; max-width:680px; text-align:center;">
                        <div class="phase-indicator" style="margin-bottom:12px;">DESENLACE // LÍNEA TEMPORAL BIFROST</div>
                        <p style="color:#c8d6e5; font-size:13px; line-height:1.8; margin-bottom:16px;">${summary}</p>
                        <div style="color:#00dcff; font-size:14px; font-style:italic; line-height:1.8; text-shadow:0 0 12px rgba(0,220,255,0.5); margin-bottom:20px;">
                            — Dylan Thomas<br>${poem}
                        </div>
                        <button class="btn-orbit" id="restart-btn" style="border-color:#00dcff; color:#00dcff; box-shadow:0 0 14px rgba(0,220,255,0.25);">↺ Reiniciar Simulación</button>
                    </div>
                `;
                conclusionBox.style.display = 'block';

                document.getElementById('restart-btn').addEventListener('click', () => {
                    changePhase('welcome');
                });
            }

            showEpilogueDialogue();

            nextBtn.addEventListener('click', () => {
                currentDiag++;
                showEpilogueDialogue();
            });
        }

        // Iniciar el juego en la fase correspondiente
        const savedPhase = localStorage.getItem('interstellar_current_phase');
        if (savedPhase && ['welcome', 'intro', 'stealth', 'hangar', 'flight', 'asteroids', 'wormhole', 'preorbit', 'orbit', 'choice', 'epilogue'].includes(savedPhase)) {
            // Permitir retomar la fase autoguardada para evitar frustración
            gameState.currentPhase = savedPhase;
            if (savedPhase !== 'welcome') {
                // Forzar a welcome para que primero den clic y habiliten audio
                gameState.currentPhase = 'welcome';
            }
        }
        changePhase(gameState.currentPhase);
    </script>
</body>
</html>
